<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar navbar-dark bg-dark navbar-expand-lg">
        <div class="container">
            <a href="#" class="navbar-brand">
                GamingZone
            </a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <button class="btn btn-dark">
                            Inicio
                        </button>
                    </li>
                    <li class="nav-item ms-2">
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="modalRegistro">
                            Registro
                        </button>
                    </li>
                    <li class="nav-item ms-2">
                        <button class="btn btn-success" onclick="irUsuarios()">
                            Usuarios
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="container py-5">
        <div class="row align-items-center">
            <div class="col-lg-6">
                <h1 class="mb-4">
                    Bienvenido a GamingZone
                </h1>
                <p class="mb-4">
                    una plataforma donde se habla de videosjuegos, se comparten noticias, tutoriales, tendencias y no se que poner mas
                </p>
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalRegistro">
                    Registrarse
                </button>
            </div>
            <div class="col-lg-6">
                <img src="banner.jpg" class="img-fluid rounded">
            </div>
        </div>
    </section>

    <div class="modal fade" id="modalRegistro">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5>
                        Registro
                    </h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formulario">
                        <input type="text" class="form-control mb-3" placeholder="Nombre" id="nombre">
                        <input type="email" class="form-control mb-3" placeholder="Correo" id="correo">
                        <input type="password" class="form-control mb-3" placeholder="Contraseña" id="password">
                        <input type="text" class="form-control mb-3" placeholder="Teléfono" id="telefono">

                        <button class="btn btn-primary w-100">
                            Guardar
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
<script src="navegacion.js"></script>
</html>
